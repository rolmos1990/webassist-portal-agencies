<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js" integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK" crossorigin="anonymous"></script>
        <title>Table pagination</title>
    </head>

    <body>
        <tfoot class="d-flex justify-content-center">
            <div class="d-flex justify-content-center align-items-center">

                <!--Botón de la izquierda-->
                <button class="d-flex align-items-center gap-1 bg-transparent border-0 px-2">
                    <span>
                        <img src="/src/table-icons/chevron-left.svg" alt="Arrow left icon." />
                    </span>
                    <span class="text-secondary">Previous</span>
                </button>

                <!--Nav Pages-->

                <nav class="d-flex align-items-center justify-content-center">
                    <ul class="d-flex align-items-center justify-content-center list-unstyled m-0 gap-1">
                        <li class="">
                            <button class="bg-primary border-0 py-2 p-4 rounded-1">1</button>
                        </li>

                        <li>
                            <button class="border-0 py-2 p-4 rounded-1 bg-transparent">2</button>
                        </li>

                        <li>
                            <button class="border-0 py-2 p-4 rounded-1 bg-transparent">3</button>
                        </li>

                        <li>
                            <button class="border-0 py-2 p-4 rounded-1 bg-transparent">4</button>
                        </li>

                        <li>
                            <button class="border-0 py-2 p-4 rounded-1 bg-transparent">5</button>
                        </li>

                        <li>
                            <button class="border-0 py-2 p-4 rounded-1 bg-transparent">...</button>
                        </li>

                        <li>
                            <button class="border-0 py-2 p-4 rounded-1 bg-transparent">11</button>
                        </li>
                    </ul>
                </nav>

                <!--Botón de la derecha-->
                <button class="d-flex align-items-center gap-1 bg-transparent border-0 px-2">
                    <span>Next</span>
                    <span>
                        <img src="/src/table-icons/chevron-right.svg" alt="Arrow right icon." />
                    </span>
                </button>
            </div>
        </tfoot>
    </body>
</html>
