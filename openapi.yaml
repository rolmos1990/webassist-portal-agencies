          type: string
          nullable: true
          example: null
        nombre:
          type: string
        apellido:
          type: string
        telefono:
          type: string
        ultimo_login:
          type: string
          example: "1758296449"
        imagen:
          type: string
          example: ""
        distribuidor:
          type: string
          example: "44"
        comision:
          type: string
          example: "0.00"
        cambiar_password:
          type: string
          example: "0"
        rol:
          type: string
          example: "1"
        tipo_pago:
          type: string
          example: "2"
        qr:
          type: string
          example: "agente_197.png"
        token_api:
          type: string
          example: "529c7985d3973aa370134805f05c0206c67221809314b30093c059e5f537273f"
        recibir_correos_renovaciones:
          type: string
          example: "1"
        correo_renovaciones_alternativo:
          type: string
          example: ""
        status:
          type: string
          example: "1"
        userid:
          type: string
        nombre_completo:
          type: string
          example: "test test"
        cambiarpassword:
          type: boolean
          example: false
        agencia:
          type: string
          example: "44"
        idioma_user:
          type: string
          example: "es"
        roles:
          type: array
          items:
            type: string
          example: ["agente"]
    ReporteVentasAgenciaResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            mes:
              type: string
              example: "09"
            mes_nombre:
              type: string
              example: "Septiembre"
            ano:
              type: string
              example: "2025"
            agencia:
              description: ID de la agencia
              type: string
              example: "1"
            agente:
              type: integer
              example: 0
            items:
              type: array
              items:
                type: object
                description: Detalle de cada venta
                properties:
                  id:
                    type: string
                  voucher:
                    type: string
                    example: "A93-XXXX"
                  fecha_venta:
                    type: string
                    example: "01/09/2025 11:55 am"
                  agencia_id:
                    type: string
                    example: "1"
                  agencia_nombre:
                    type: string
                    example: "WE ASSIST"
                  agente_id:
                    type: string
                    example: "0"
                  agente_nombre:
                    type: string
                    example: ""
                  precio_venta:
                    type: number
                    example: 39.97
                  costo_procesamiento:
                    type: number
                    example: 1.5
                  base_comision:
                    type: number
                    example: 39.97
                  porcentaje:
                    type: string
                    example: "100.00"
                  monto:
                    type: string
                    example: "33.18"
            acums:
              type: object
              properties:
                precio:
                  type: number
                  description: Monto total de ventas
                  example: 28057.23
                costo_administrativo:
                  type: number
                  example: 1002.68
                base_comision:
                  type: number
                  example: 28057.23
                monto:
                  type: number
                  description: Monto total de comisiones
                  example: 13839.79

  parameters:
    userTokenHeader:
      name: userToken
      in: header
      required: true
      schema:
        type: string
      description: Token de usuario para autenticación

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

security:
  - bearerAuth: []