openapi: 3.1.0
info:
  title: WAC API
  description: Api para uso interno WAC.
  version: 1.0.1
  contact:
    name: Pixel Media Publicidad
    url: https://www.pixelmedia.com.pa
    email: webmaster@weassistgroup.com
servers:
  - url: "https://dev.weassistgroup.com/admin/api"
    description: Dev server
  - url: "https://www.weassistgroup.com/admin/api"
    description: Production server
tags:
  - name: idiomas
    description: Endpoints relacionados con idiomas
  - name: agentes
    description: Endpoints de agentes y agencias
  - name: emisiones
    description: Endpoints de Emisiones de Vouchers
  - name: renovaciones
    description: Endpoints para listado de renovaciones
  - name: cobranding
    description: Endpoints para configuración de cobranding
  - name: leads
    description: Endpoints para gestión de leads
paths:
  /idiomas:
    get:
      summary: Listado de Idiomas
      description: Los idiomas que tiene el Sitio
      operationId: getIdiomas
      tags:
        - idiomas
      responses:
        "200":
          description: Respuesta exitosa con los idiomas
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    additionalProperties:
                      type: string
                    example:
                      es: "Español"
                      en: "English"
        "400":
          description: Bad Request
        "404":
          description: Resource not found
  /{idioma}/lang_strings_version:
    get:
      summary: Última versión de las traducciones
      description: Muestra la última versión de las traducciones del idioma
      operationId: getLangStringsVersion
      tags:
        - idiomas
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
      responses:
        "200":
          description: Respuesta exitosa con las traducciones y su versión
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      version:
                        type: string
                        example: "1e02e983cb4b66157f12e503c0c55c9c"
        "400":
          description: Bad Request
        "404":
          description: Resource not found
  /{idioma}/lang_strings:
    get:
      summary: Traducciones
      description: Muestra las traducciones del idioma seleccionado
      operationId: getLangStrings
      tags:
        - idiomas
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
      responses:
        "200":
          description: Respuesta exitosa con las Traducciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    additionalProperties:
                      type: string
                    example:
                      slug_idioma: "es"
                      idioma: "Español"
                      meta_description: "We Assist es una compañía de asistencia..."
                      derechos: "Todos los derechos Reservados © 2025 - We Assist Corp."
                      info_contacto: "Información de contacto"
                      # ...otros campos dinámicos...
        "400":
          description: Bad Request
        "404":
          description: Resource not found

  /{idioma}/documentos/{voucher}:
    get:
      summary: Documentos del voucher
      description: Devuelve los documentos del voucher entregado
      operationId: getDocumentosVoucher
      tags:
        - emisiones
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
        - name: voucher
          in: path
          required: true
          schema:
            type: string
          description: El código del voucher
      responses:
        "200":
          description: Respuesta exitosa con los documentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  documentos:
                    type: array
                    items:
                      type: object
                      properties:
                        nombre:
                          type: string
                        voucher:
                          type: string
                          example: "A93-XXXX"
                        pdf_vouchers:
                          type: object
                          properties:
                            es:
                              type: string
                              example: "https://www.weassistgroup.com/vouchers/voucher_A93-XXXX_es.pdf"
                            en:
                              type: string
                              example: "https://www.weassistgroup.com/vouchers/voucher_A93-XXXX_en.pdf"
                        links_tarjetas_es:
                          type: array
                          items:
                            type: object
                            properties:
                              nombre:
                                type: string
                                example: "test user"
                              file:
                                type: string
                                example: "https://www.weassistgroup.com/vouchers/card_A93-XXXX_1_es.pdf"
                        links_tarjetas_en:
                          type: array
                          items:
                            type: object
                            properties:
                              nombre:
                                type: string
                                example: "CESAR VILLALAZ"
                              file:
                                type: string
                                example: "https://www.weassistgroup.com/vouchers/card_A93-XXXX_1_en.pdf"
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Bad Request
        "404":
          description: Resource not found

  /{idioma}/login:
    post:
      summary: Iniciar sesión
      description: Inicia la sesión de un agente
      operationId: postAgenteLogin
      tags:
        - agentes
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                user:
                  type: string
                  format: email
                  description: El email del usuario
                pw:
                  type: string
                  description: La contraseña del usuario
      responses:
        "200":
          description: Respuesta exitosa con el token de acceso en el array data (token_api)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/UserLogin"
        "400":
          description: Bad Request
        "404":
          description: Resource not found

  /{idioma}/logout:
    post:
      summary: Cerrar Sesión
      description: Cierra la sesión del usuario
      operationId: postLogout
      tags:
        - agentes
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
        - $ref: "#/components/parameters/userTokenHeader"
      responses:
        "200":
          description: Sesión cerrada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "400":
          description: Bad Request
        "404":
          description: Resource not found

  /{idioma}/reporte-ventas-agencia:
    get:
      summary: Reporte de ventas por agencia
      description: Reporte de ventas por agencia (mes actual)
      operationId: getReporteVentasAgencia
      tags:
        - agentes
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
        - $ref: "#/components/parameters/userTokenHeader"
      responses:
        "200":
          description: Reporte de ventas exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReporteVentasAgenciaResponse"
        "400":
          description: Bad Request
        "404":
          description: Resource not found

  /{idioma}/reporte-ventas-agencia/{mes_ano}:
    get:
      summary: Reporte de ventas por agencia (filtrado)
      description: Reporte de ventas por agencia filtrado por mes y año (MM-YYYY)
      operationId: getReporteVentasAgenciaFiltrado
      tags:
        - agentes
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
        - name: mes_ano
          in: path
          required: true
          schema:
            type: string
            example: "08-2025"
          description: Mes y año en formato MM-YYYY
        - $ref: "#/components/parameters/userTokenHeader"
      responses:
        "200":
          description: Reporte de ventas exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReporteVentasAgenciaResponse"
        "400":
          description: Bad Request
        "404":
          description: Resource not found

  /{idioma}/perfil:
    get:
      summary: Perfil de Agente
      description: Obtiene el perfil del usuario autenticado
      operationId: getPerfilAgente
      tags:
        - agentes
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
        - $ref: "#/components/parameters/userTokenHeader"
      responses:
        "200":
          description: Perfil del usuario autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/UserLogin"
        "400":
          description: Bad Request
        "404":
          description: Resource not found
  /{idioma}/cobranding:
    post:
      summary: Configuración de una página de cobranding
      description: Devuelve la configuración de una página de cobranding para un idioma y URL específicos.
      operationId: getCobrandingConfig
      tags:
        - cobranding
      parameters:
        - name: idioma
          in: path
          required: true
          description: Idioma de la configuración.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: URL para obtener la configuración de cobranding.
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  datos:
                    type: object
                    properties:
                      id:
                        type: string
                      agencia:
                        type: string
                      agente:
                        type: string
                      color1:
                        type: string
                      color2:
                        type: string
                      color3:
                        type: string
                      color4:
                        type: string
                      logo:
                        type: string
                      home_sec1_img:
                        type: string
                      home_sec3_img1:
                        type: string
                      home_sec3_img2:
                        type: string
                      home_sec3_img3:
                        type: string
                      home_bg_form:
                        type: string
                      telefono:
                        type: string
                        nullable: true
                      whatsapp:
                        type: string
                        nullable: true
                      email:
                        type: string
                        nullable: true
                      nombre:
                        type: string
                      dominio:
                        type: string
                      home_titulo:
                        type: string
                      home_subtitulo:
                        type: string
                      home_cta1:
                        type: string
                      home_sec2_titulo:
                        type: string
                      home_sec2_subtitulo:
                        type: string
                      home_sec3_titulo:
                        type: string
                      home_sec3_subtitulo1:
                        type: string
                      home_sec3_texto1:
                        type: string
                      home_sec3_subtitulo2:
                        type: string
                      home_sec3_texto2:
                        type: string
                      home_sec3_subtitulo3:
                        type: string
                      home_sec3_texto3:
                        type: string
                      home_sec3_cta:
                        type: string
                      home_sec4_titulo:
                        type: string
                      home_sec4_texto:
                        type: string
                      footer_col:
                        type: string
                      planes:
                        type: array
                        items:
                          type: string
                      tipos_planes:
                        type: array
                        items:
                          type: string
        "400":
          description: Bad Request
        "404":
          description: Resource not found
  /{idioma}/vouchers_master:
    get:
      summary: Vouchers Master
      description: Lista los vouchers master disponibles para el usuario autenticado
      operationId: getVouchersMaster
      tags:
        - emisiones
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
        - $ref: "#/components/parameters/userTokenHeader"
      responses:
        "200":
          description: Listado de vouchers master
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 3
                        codigo:
                          type: string
                          example: "A93-A96-1"
                        agencia:
                          type: string
                          example: "96"
                        agente:
                          type: string
                          example: "443"
                        plan:
                          type: string
                          example: "122"
                        noches:
                          type: string
                          example: "300"
                        noches_disponibles:
                          type: string
                          example: "282"
                        precio:
                          type: string
                          example: "1011.00"
                        costo_procesamiento:
                          type: string
                          example: "0.00"
                        precio_dia:
                          type: string
                          example: "3.37"
                        costo_dia:
                          type: string
                          example: "0.73"
                        ts_ini:
                          type: string
                          example: "1736658000"
                        ts_fin:
                          type: string
                          example: "1768193999"
                        ts_creacion:
                          type: string
                          example: "1736372465"
                        ts_emision:
                          type: string
                          example: "1736606274"
                        comision_procesada:
                          type: string
                          example: "1"
                        status:
                          type: string
                          example: "1"
                    user:
                      $ref: "#/components/schemas/UserLogin"
        "400":
          description: Bad Request
        "404":
          description: Resource not found

  /{idioma}/vouchers_master/{id_master}:
    get:
      summary: Detalle de Voucher Master
      description: Obtiene el detalle de un voucher master específico (los vouchers ya creados del master enviado)
      operationId: getVouchersMasterDetail
      tags:
        - emisiones
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
        - name: id_master
          in: path
          required: true
          schema:
            type: integer
          description: ID del voucher master
        - $ref: "#/components/parameters/userTokenHeader"
      responses:
        "200":
          description: Detalle del voucher master
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      voucher:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "3"
                          codigo:
                            type: string
                            example: "A93-XXX-1"
                          agencia:
                            type: string
                          agente:
                            type: string
                          plan:
                            type: string
                            example: "122"
                          noches:
                            type: string
                            example: "300"
                          noches_disponibles:
                            type: string
                            example: "282"
                          precio:
                            type: string
                            example: "10.00"
                          costo_procesamiento:
                            type: string
                            example: "0.00"
                          precio_dia:
                            type: string
                            example: "1.11"
                          costo_dia:
                            type: string
                            example: "0.01"
                          ts_ini:
                            type: string
                            example: "1736658000"
                          ts_fin:
                            type: string
                            example: "1768193999"
                          ts_creacion:
                            type: string
                            example: "1736372465"
                          ts_emision:
                            type: string
                            example: "1736606274"
                          comision_procesada:
                            type: string
                            example: "1"
                          status:
                            type: string
                            example: "1"
                      items:
                        type: array
                        description: Lista de vouchers creados bajo este master
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              example: "4094"
                            linea_carrito:
                              type: string
                              example: "26944"
                            pais:
                              type: string
                              example: "1"
                            pais_destino:
                              type: string
                              example: "12"
                            plan:
                              type: string
                              example: "122"
                            distribuidor:
                              type: string
                            agente:
                              type: string
                            precio:
                              type: string
                              example: "30.33"
                            costo:
                              type: string
                              example: "6.57"
                            costo_base:
                              type: string
                              example: "6.57"
                            costo_transaccion:
                              type: string
                              example: "0.00"
                            margen:
                              type: string
                              example: "23.76"
                            fecha_ts:
                              type: string
                              example: "1736722102"
                            fecha_inicio_ts:
                              type: string
                              example: "1736658000"
                            fecha_fin_ts:
                              type: string
                              example: "1737349200"
                            voucher:
                              type: string
                              example: "A93-XXX-1-XXX"
                            voucher_master:
                              type: string
                              example: "3"
                            ocultar_precios:
                              type: string
                              example: "0"
                            enviar_correos:
                              type: string
                              example: "1"
                            contacto:
                              type: string
                            contacto_telefono:
                              type: string
                            contacto_email:
                              type: string
                            consideraciones:
                              type: string
                            cancelada:
                              type: string
                            fecha_cancelacion_ts:
                              type: string
                              nullable: true
                              example: null
                            usuario_cancelacion:
                              type: string
                              example: "0"
                            cobrada_recibo:
                              type: string
                              nullable: true
                              example: null
                            pagada_cheque:
                              type: string
                              nullable: true
                              example: null
                            metodo_pago:
                              type: string
                              example: "2"
                            pais_bin:
                              type: string
                              example: ""
                            transaccion_internacional:
                              type: string
                              example: "1"
                            comision_procesada:
                              type: string
                              example: "1"
                            renovacion_de:
                              type: string
                              nullable: true
                              example: null
                            leido_erp:
                              type: string
                              example: "0"
                            aprobacion_temp:
                              type: string
                              example: ""
                            noches:
                              type: integer
                              example: 18
                  usuario:
                    $ref: "#/components/schemas/UserLogin"

        "400":
          description: Bad Request
        "404":
          description: Resource not found

  /{idioma}/renovaciones-pendientes:
    get:
      summary: Renovaciones Pendientes
      description: Lista las renovaciones pendientes para el usuario autenticado
      operationId: getRenovacionesPendientes
      tags:
        - renovaciones
      parameters:
        - name: idioma
          in: path
          required: true
          schema:
            type: string
          description: El código del idioma
        - $ref: "#/components/parameters/userTokenHeader"
      responses:
        "200":
          description: Listado de renovaciones pendientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              example: "9"
                            venta:
                              type: string
                              example: "3346"
                            agente:
                              type: string
                              example: "56"
                            agencia:
                              type: string
