                                  example: null
                                metodo_pago:
                                  type: string
                                  example: "1"
                                pais_bin:
                                  type: string
                                  example: "PA"
                                transaccion_internacional:
                                  type: string
                                  example: "2"
                                comision_procesada:
                                  type: string
                                  example: "1"
                                renovacion_de:
                                  type: string
